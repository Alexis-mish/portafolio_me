<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- squircle background container -->
  <rect width="460" height="460" x="26" y="26" rx="110" fill="#080810" stroke="#1f1e33" stroke-width="16" />
  
  <!-- Glowing code icon < /> -->
  <g filter="url(#glow)" transform="translate(12, 12)">
    <!-- Left bracket < -->
    <path d="M 160 140 L 75 244 L 160 348" fill="none" stroke="url(#grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Slash / -->
    <line x1="272" y1="108" x2="216" y2="380" stroke="url(#grad)" stroke-width="40" stroke-linecap="round" />
    <!-- Right bracket > -->
    <path d="M 328 140 L 413 244 L 328 348" fill="none" stroke="url(#grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>